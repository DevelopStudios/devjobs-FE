<div class="search-container">
    <div class="search">
        @if (smartSearch.isSearching()) {
            <div class="icon ai-pulse">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="#5a64e1"/>
                </svg>
            </div>
        } @else {
            @if (filter.general.length === 0) {
                <div class="icon">
                    <img src="assets/search-icon.svg" alt="search-icon">
                </div>
            } @else {
                <div class="icon clickable" (click)="clear()">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#5a64e1">
                        <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
                    </svg>
                </div>
            }
        }

        <div class="form">
            <input type="text" 
                   class="search" 
                   [(ngModel)]="filter.general"  
                   (ngModelChange)="search()"
                   [placeholder]="smartSearch.isModelLoading() ? 'Initializing AI...' : 'Filter by title, expertise, location…'">
            
            @if (smartSearch.isReady()) {
                <span class="ai-badge">WebGPU Powered</span>
            }
        </div>
    </div>
</div>
